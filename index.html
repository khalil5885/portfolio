<style>
/* ─── Reset & Base ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:#0d0d0d;
  color:#f0ede6;
  font-family:'Syne',sans-serif;
  font-size:16px;
  line-height:1.7;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:'Syne',sans-serif}
img{display:block;max-width:100%}

/* ─── Design Tokens ─── */
:root{
  --bg:#0d0d0d;
  --surface:#141414;
  --surface2:#1c1c1c;
  --border:#252525;
  --accent:#c8f050;
  --accent2:#8bfcd8;
  --text:#f0ede6;
  --muted:#6e6e66;
  --font-display:'DM Serif Display',serif;
  --font-body:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
  --ease:cubic-bezier(.22,1,.36,1);
}

/* ─── Noise texture overlay ─── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  opacity:.025;
  pointer-events:none;
}

/* ─── Scrollbar ─── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:#252525;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* ─── Shared layout ─── */
.wrap{max-width:1100px;margin:0 auto;padding:0 3rem}

/* ─── Reveal animation ─── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}
.reveal-delay-1{transition-delay:.1s}
.reveal-delay-2{transition-delay:.2s}
.reveal-delay-3{transition-delay:.3s}
.reveal-delay-4{transition-delay:.4s}

/* ─── Section label ─── */
.section-label{
  display:inline-flex;align-items:center;gap:.6rem;
  font-family:var(--font-mono);font-size:.72rem;
  color:var(--accent);letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:.9rem;
}
.section-label::before{content:'';display:block;width:20px;height:1px;background:var(--accent)}

/* ─── Section title ─── */
.section-title{
  font-family:var(--font-display);
  font-size:clamp(2rem,3.5vw,3.2rem);
  line-height:1.08;margin-bottom:1rem;
}
.section-title em{color:var(--accent);font-style:italic}

/* ─── Buttons ─── */
.btn{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.72rem 1.6rem;border-radius:99px;
  font-size:.82rem;font-weight:600;letter-spacing:.06em;
  border:none;transition:all .25s var(--ease);
}
.btn-solid{background:var(--accent);color:#0d0d0d}
.btn-solid:hover{opacity:.85;transform:translateY(-1px)}
.btn-ghost{border:1px solid var(--border);color:var(--muted);background:transparent}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

/* ═══════════════════════════════════════════════
   LANGUAGE TOGGLE
═══════════════════════════════════════════════ */
.lang-toggle{
  display:flex;align-items:center;gap:.3rem;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:99px;padding:.25rem;
  z-index:201;
}
.lang-btn{
  background:transparent;border:none;
  padding:.35rem .7rem;border-radius:99px;
  font-size:.7rem;font-weight:600;letter-spacing:.05em;
  color:var(--muted);transition:all .25s var(--ease);
  display:flex;align-items:center;gap:.35rem;
}
.lang-btn:hover{color:var(--text)}
.lang-btn.active{
  background:var(--accent);color:#0d0d0d;
}
.lang-flag{
  font-size:.9rem;
  line-height:1;
}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
#nav{
  position:fixed;top:0;left:0;width:100%;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 3rem;
  border-bottom:1px solid transparent;
  transition:background .4s,border-color .4s,backdrop-filter .4s;
}
#nav.stuck{
  background:rgba(13,13,13,.88);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-color:var(--border);
}
.nav-logo{
  font-family:var(--font-display);font-size:1.4rem;
  letter-spacing:.01em;color:var(--text);
}
.nav-logo b{color:var(--accent)}
.nav-center{
  display:flex;align-items:center;gap:2rem;
}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{
  font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);transition:color .2s;
  position:relative;
}
.nav-links a::after{
  content:'';position:absolute;bottom:-4px;left:0;
  width:0;height:1px;background:var(--accent);
  transition:width .3s var(--ease);
}
.nav-links a:hover{color:var(--text)}
.nav-links a:hover::after{width:100%}
.nav-cta{
  font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;
  border:1px solid var(--border);padding:.45rem 1.1rem;border-radius:99px;
  color:var(--muted);transition:border-color .2s,color .2s,background .2s;
}
.nav-cta:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,240,80,.05)}

/* Mobile menu */
.mobile-menu-btn{
  display:none;
  background:none;border:none;
  color:var(--text);font-size:1.4rem;
  padding:.3rem;
}

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
#hero{
  min-height:100vh;position:relative;overflow:hidden;
  display:flex;align-items:center;
}
.hero-glow{
  position:absolute;top:0;right:-10%;width:70vw;height:100vh;
  background:radial-gradient(ellipse at 70% 40%,rgba(200,240,80,.06) 0%,transparent 65%);
  pointer-events:none;
}
.hero-grid-bg{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse at 60% 50%,black 20%,transparent 70%);
  pointer-events:none;
}
.hero-inner{
  position:relative;z-index:1;
  display:grid;grid-template-columns:1fr 1fr;
  gap:4rem;align-items:center;
  max-width:1100px;margin:0 auto;
  width:100%;padding:8rem 3rem 5rem;
}
.hero-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(200,240,80,.06);border:1px solid rgba(200,240,80,.2);
  border-radius:99px;padding:.32rem .9rem;
  font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);
  margin-bottom:1.6rem;
}
.hero-badge-dot{
  width:7px;height:7px;border-radius:50%;background:var(--accent);
  animation:blink 5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(200,240,80,.4)}50%{opacity:.4;box-shadow:0 0 0 4px rgba(200,240,80,0)}}
.hero-title{
  font-family:var(--font-display);
  font-size:clamp(3rem,5.5vw,5.2rem);
  line-height:1.02;letter-spacing:-.025em;
  margin-bottom:1.4rem;
}
.hero-title em{color:var(--accent);font-style:italic}
.hero-desc{
  color:var(--muted);font-size:1rem;
  max-width:430px;line-height:1.85;
  margin-bottom:2.2rem;
}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap}

/* Profile card */
.hero-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:1.5rem;padding:2rem;position:relative;overflow:hidden;
  text-align:center;
  transition:all 0.6s var(--ease);
  display:flex;flex-direction:column;align-items:center;
  min-height:420px;
}
.hero-card::before{
  content:'';position:absolute;top:-40%;right:-30%;
  width:220px;height:220px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,240,80,.07),transparent 70%);
  z-index:0;
}
.hero-avatar{
  width:150px;height:150px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.5rem;
  box-shadow:0 0 30px rgba(200,240,80,0.15), 0 10px 40px rgba(0,0,0,0.4);
  transition:all 0.6s var(--ease);
  overflow:hidden;
  border:3px solid rgba(200,240,80,0.25);
  cursor:pointer;
  z-index:2;
  position:relative;
  flex-shrink:0;
}
.hero-avatar:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(200,240,80,0.3), 0 15px 50px rgba(0,0,0,0.5);
}
.hero-avatar img{
  width:100%;height:100%;
  object-fit:cover;
  object-position:top center 30%;
  transition:transform 0.6s var(--ease);
}

/* EXPANDED STATE - Clean layout with image on top, info below */
.hero-card.expanded {
  padding: 0;
  background: var(--surface);
}
.hero-card.expanded .hero-avatar{
  width:100%;
  height:380px;
  border-radius:1.5rem 1.5rem 0 0;
  margin:0;
  border-color:transparent;
  box-shadow:none;
  cursor:default;
}
.hero-card.expanded .hero-avatar:hover{
  transform:none;
}
.hero-card.expanded .hero-avatar img{
  border-radius:1.5rem 1.5rem 0 0;
}

.hero-card-info {
  width:100%;
  transition:all 0.6s var(--ease);
  z-index:3;
  position:relative;
  padding: 0 0.5rem;
}

.hero-card.expanded .hero-card-info {
  padding: 1.5rem 2rem 2rem;
  background: var(--surface);
}

/* Subtle entrance for info when expanded */
.hero-card.expanded .hero-card-info > * {
  animation: cardSlideUp 0.5s var(--ease) forwards;
}

@keyframes cardSlideUp {
  from { opacity:0; transform:translateY(15px); }
  to { opacity:1; transform:translateY(0); }
}

@media(max-width:900px){
  .hero-avatar{width:160px;height:160px}
}
.hero-card-name{font-family:var(--font-display);font-size:1.25rem;margin-bottom:.2rem}
.hero-card-role{font-size:.72rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.4rem}
.skill-pills{display:flex;flex-wrap:wrap;gap:.45rem;justify-content:center}
.skill-pill{
  background:var(--surface2);border:1px solid var(--border);
  padding:.22rem .65rem;border-radius:99px;
  font-size:.72rem;color:var(--muted);font-family:var(--font-mono);
  transition:border-color .2s,color .2s,transform .2s;
}
.skill-pill:hover{border-color:var(--border);transform:translateY(-1px)}
.skill-pill.hl{
  border-color:rgba(200,240,80,.35);color:var(--accent);
  background:rgba(200,240,80,.06);
}
.hero-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:1rem;
  margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);
}
.stat-num{font-family:var(--font-display);font-size:1.7rem;color:var(--text)}
.stat-lbl{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ═══════════════════════════════════════════════
   ABOUT
═══════════════════════════════════════════════ */
#about{padding:6rem 0}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;margin-top:3rem}
.about-bio p{color:var(--muted);line-height:1.9;font-size:1rem}
.about-bio p+p{margin-top:1rem}
.stack-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.stack-item{
  background:var(--surface);border:1px solid var(--border);
  border-radius:1rem;padding:1.1rem 1.2rem;
  transition:border-color .25s,transform .25s,box-shadow .25s;
  cursor:default;
}
.stack-item:hover{border-color:rgba(200,240,80,.3);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.stack-icon{font-size:1.1rem;margin-bottom:.5rem}
.stack-name{font-family:var(--font-mono);font-size:.82rem;color:var(--text);margin-bottom:.15rem}
.stack-level{font-size:.7rem;color:var(--muted)}

/* ═══════════════════════════════════════════════
   PROJECTS
═══════════════════════════════════════════════ */
#projects{padding:6rem 0}
.projects-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));
  gap:1.5rem;margin-top:3rem;
}
.project-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:1.5rem;overflow:hidden;
  transition:border-color .3s,transform .3s,box-shadow .3s;
  display:flex;flex-direction:column;
}
.project-card:hover{border-color:var(--accent);transform:translateY(-5px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.project-thumb{
  height:190px;display:flex;align-items:center;justify-content:center;
  font-size:3.8rem;position:relative;overflow:hidden;
  transition:transform .4s var(--ease);
}
.project-card:hover .project-thumb{transform:scale(1.04)}
.project-thumb-inner{position:relative;z-index:1}
.project-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 50%,rgba(13,13,13,.5));
}
.project-body{padding:1.5rem;flex:1;display:flex;flex-direction:column}
.project-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.9rem}
.project-tag{
  background:var(--surface2);border:1px solid var(--border);
  padding:.2rem .6rem;border-radius:99px;
  font-size:.68rem;color:var(--muted);font-family:var(--font-mono);
  transition:border-color .2s;
}
.project-tag:hover{border-color:var(--accent)}
.project-title{font-family:var(--font-display);font-size:1.2rem;margin-bottom:.5rem}
.project-desc{font-size:.88rem;color:var(--muted);line-height:1.75;flex:1;margin-bottom:1.3rem}
.project-links{display:flex;gap:.75rem}
.project-link{
  font-size:.75rem;letter-spacing:.09em;text-transform:uppercase;
  border:1px solid var(--border);padding:.35rem .9rem;border-radius:99px;
  color:var(--muted);transition:border-color .2s,color .2s,background .2s;
}
.project-link:hover{border-color:var(--accent);color:var(--accent)}
.project-link.primary{border-color:var(--accent);color:var(--accent)}
.project-link.primary:hover{background:rgba(200,240,80,.08)}

/* ═══════════════════════════════════════════════
   CONTACT
═══════════════════════════════════════════════ */
#contact{padding:6rem 0}
.contact-inner{
  background:var(--surface);border:1px solid var(--border);
  border-radius:2rem;padding:4rem;margin-top:3rem;
  display:grid;grid-template-columns:1fr 1.3fr;gap:4rem;align-items:start;
  position:relative;overflow:hidden;
}
.contact-inner::before{
  content:'';position:absolute;bottom:-60%;left:-20%;
  width:400px;height:400px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,252,216,.04),transparent 70%);
  pointer-events:none;
}
.contact-desc{color:var(--muted);font-size:.95rem;line-height:1.85;margin-top:.6rem;margin-bottom:2rem}
.contact-socials{list-style:none;display:flex;flex-direction:column;gap:.75rem}
.contact-socials li a{
  display:flex;align-items:center;gap:.75rem;
  font-size:.82rem;color:var(--muted);
  transition:color .2s,transform .2s;
}
.contact-socials li a:hover{color:var(--accent);transform:translateX(4px)}
.social-arrow{font-family:var(--font-mono);color:var(--accent);font-size:.78rem}

/* Form */
.contact-form{display:flex;flex-direction:column;gap:.9rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-group label{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.form-group input,
.form-group textarea{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:.65rem;padding:.72rem 1rem;
  color:var(--text);font-family:'Syne',sans-serif;font-size:.88rem;
  outline:none;resize:none;
  transition:border-color .2s,background .2s;
}
.form-group input::placeholder,
.form-group textarea::placeholder{color:var(--muted)}
.form-group input:focus,
.form-group textarea:focus{border-color:rgba(200,240,80,.5);background:var(--surface)}
.form-group textarea{height:110px}
.form-submit{
  background:var(--accent);color:#0d0d0d;
  padding:.8rem 2rem;border-radius:99px;border:none;
  font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;align-self:flex-start;
  transition:opacity .2s,transform .2s,box-shadow .2s;
}
.form-submit:hover{opacity:.85;transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,240,80,.2)}
.form-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.form-msg{font-family:var(--font-mono);font-size:.78rem;margin-top:.2rem}
.form-msg.ok{color:var(--accent)}
.form-msg.err{color:#f05050}

/* ═══════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════ */
footer{
  border-top:1px solid var(--border);
  padding:2rem 3rem;
  display:flex;align-items:center;justify-content:space-between;
  max-width:1100px;margin:0 auto;
}
.footer-copy{font-size:.78rem;color:var(--muted)}
.footer-socials{display:flex;gap:1.5rem;list-style:none}
.footer-socials a{font-size:.78rem;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;transition:color .2s}
.footer-socials a:hover{color:var(--accent)}

/* ═══════════════════════════════════════════════
   CURSOR GLOW
═══════════════════════════════════════════════ */
#cursor-glow{
  position:fixed;width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(200,240,80,.05),transparent 65%);
  pointer-events:none;z-index:0;
  transform:translate(-50%,-50%);
  transition:transform .08s linear;
  mix-blend-mode:screen;
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media(max-width:900px){
  .hero-inner{grid-template-columns:1fr;padding:7rem 1.5rem 4rem}

  /* Mobile card adjustments */
  .hero-card{
    min-height:auto;
    padding:1.5rem;
    width:100%;
    max-width:400px;
    margin:0 auto;
  }
  .hero-avatar{
    width:140px;
    height:140px;
  }
  .hero-avatar img{
    object-position: center 10%;  /* Shift image down so face is centered in circle */
  }

  /* Expanded state on mobile */
  .hero-card.expanded .hero-avatar{
    height:320px;
  }
  .hero-card.expanded .hero-avatar img{
    object-position: center 15%; 
    }
  .hero-card.expanded .hero-card-info{
    padding:1.2rem 1.5rem 1.5rem;
  }

  #nav{
    padding:0.8rem 1rem;
    gap:0.5rem;
  }
  .nav-logo{
    font-size:1.1rem;
    flex-shrink:0;
    line-height:1.1;
    display:flex;
    flex-direction:column;
    align-items:flex-start;
  }
  .nav-logo b{
    display:block;
    margin-top:-0.1em;
  }
  .nav-links{display:none}
  .mobile-menu-btn{display:block}
  .lang-toggle{margin-left:auto;margin-right:1rem}
  .wrap{padding:0 1.5rem}
  .about-grid{grid-template-columns:1fr;gap:2.5rem}
  .contact-inner{grid-template-columns:1fr;padding:2rem;gap:2rem}
  .form-row{grid-template-columns:1fr}
  footer{flex-direction:column;gap:1rem;text-align:center;padding:1.5rem}
}
</style>

</head>
<body>

<!-- Cursor glow (desktop only) -->
<div id="cursor-glow"></div>

<!-- ═══════ NAV ═══════ -->
<nav id="nav">
  <a href="#hero" class="nav-logo" id="nav-logo">…</a>
  <div class="nav-center">
    <ul class="nav-links">
      <li><a href="#about" id="nav-about">About</a></li>
      <li><a href="#projects" id="nav-projects">Projects</a></li>
      <li><a href="#contact" id="nav-contact">Contact</a></li>
    </ul>
    <div class="lang-toggle" id="lang-toggle">
      <button class="lang-btn active" data-lang="en" aria-label="English">
        <span class="lang-flag">🇬🇧</span> EN
      </button>
      <button class="lang-btn" data-lang="fr" aria-label="Français">
        <span class="lang-flag">🇫🇷</span> FR
      </button>
    </div>
  </div>
  <a href="#contact" class="nav-cta" id="nav-cta">Hire me</a>
  <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">☰</button>
</nav>

<!-- Mobile Menu Overlay -->
<div id="mobile-menu" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(13,13,13,.95);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:2rem;">
  <button id="mobile-menu-close" style="position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:var(--text);font-size:1.5rem;cursor:pointer;">✕</button>
  <a href="#about" class="mobile-nav-link" style="font-family:var(--font-display);font-size:2rem;color:var(--text);">About</a>
  <a href="#projects" class="mobile-nav-link" style="font-family:var(--font-display);font-size:2rem;color:var(--text);">Projects</a>
  <a href="#contact" class="mobile-nav-link" style="font-family:var(--font-display);font-size:2rem;color:var(--text);">Contact</a>
</div>

<!-- ═══════ HERO ═══════ -->
<section id="hero">
  <div class="hero-glow"></div>
  <div class="hero-grid-bg"></div>
  <div class="hero-inner">
    <div class="hero-left">
      <div class="hero-badge reveal" id="hero-badge" style="display:none">
        <span class="hero-badge-dot"></span>
        <span id="badge-text"></span>
      </div>
      <h1 class="hero-title reveal reveal-delay-1" id="hero-title"></h1>
      <p class="hero-desc reveal reveal-delay-2" id="hero-desc"></p>
      <div class="hero-actions reveal reveal-delay-3">
        <a href="#projects" class="btn btn-solid" id="hero-view-projects">View Projects</a>
        <a href="#contact" class="btn btn-ghost" id="hero-get-in-touch">Get in Touch</a>
      </div>
    </div>
    <div class="hero-right reveal reveal-delay-2">
      <div class="hero-card" id="hero-card">
        <div class="hero-avatar" id="hero-avatar"></div>
        <div class="hero-card-info" id="hero-card-info">
          <div class="hero-card-name" id="hero-card-name"></div>
          <div class="hero-card-role" id="hero-card-role"></div>
          <div class="skill-pills" id="skill-pills"></div>
          <div class="hero-stats" id="hero-stats"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ═══════ ABOUT ═══════ -->
<section id="about">
  <div class="wrap">
    <div class="reveal">
      <span class="section-label" id="section-label-about">About me</span>
      <h2 class="section-title" id="about-title"></h2>
    </div>
    <div class="about-grid">
      <div class="about-bio reveal reveal-delay-1" id="about-bio"></div>
      <div class="stack-grid reveal reveal-delay-2" id="stack-grid"></div>
    </div>
  </div>
</section>

<!-- ═══════ PROJECTS ═══════ -->
<section id="projects">
  <div class="wrap">
    <div class="reveal">
      <span class="section-label" id="section-label-work">Work</span>
      <h2 class="section-title"><span id="selected-projects">Selected</span> <em id="selected-projects-em">projects</em></h2>
    </div>
    <div class="projects-grid reveal reveal-delay-1" id="projects-grid"></div>
  </div>
</section>

<!-- ═══════ CONTACT ═══════ -->
<section id="contact">
  <div class="wrap">
    <div class="reveal">
      <span class="section-label" id="section-label-contact">Contact</span>
      <h2 class="section-title" id="contact-title"></h2>
    </div>
    <div class="contact-inner reveal reveal-delay-1">
      <div>
        <p class="contact-desc" id="contact-desc"></p>
        <ul class="contact-socials" id="contact-socials"></ul>
      </div>
      <form class="contact-form" id="contact-form" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="f-name" id="label-name">Name</label>
            <input id="f-name" name="name" type="text" placeholder="John Doe" required/>
          </div>
          <div class="form-group">
            <label for="f-email" id="label-email">Email</label>
            <input id="f-email" name="email" type="email" placeholder="john@example.com" required/>
          </div>
        </div>
        <div class="form-group">
          <label for="f-subject" id="label-subject">Subject</label>
          <input id="f-subject" name="subject" type="text" placeholder="Project collaboration..."/>
        </div>
        <div class="form-group">
          <label for="f-message" id="label-message">Message</label>
          <textarea id="f-message" name="message" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="form-submit" id="form-submit">Send Message →</button>
        <p class="form-msg" id="form-msg" style="display:none"></p>
      </form>
    </div>
  </div>
</section>

<!-- ═══════ FOOTER ═══════ -->
<footer>
  <p class="footer-copy" id="footer-copy"></p>
  <ul class="footer-socials" id="footer-socials"></ul>
</footer>

<!-- ═══════ SCRIPT ═══════ -->
<script>
(function(){
  /* ── Load data ── */
  const D = JSON.parse(document.getElementById('portfolio-data').textContent);

  /* ── State ── */
  let currentLang = localStorage.getItem('portfolio-lang') || 'en';

  /* ── Helpers ── */
  const el = id => document.getElementById(id);
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const t = (key) => currentLang === 'fr' && D.ui[key + 'Fr'] ? D.ui[key + 'Fr'] : D.ui[key];

  /* ── Language Switcher ── */
  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('portfolio-lang', lang);

    // Update toggle buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === lang);
    });

    // Update HTML lang attribute
    document.documentElement.lang = lang;

    renderAll();
  }

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
  });

  /* ── Render Functions ── */
  function renderAll() {
    const isFr = currentLang === 'fr';

    /* NAV */
    el('nav-logo').innerHTML = esc(D.name).toLowerCase().replace(' ','<b>.</b>');
    el('nav-about').textContent = t('navAbout');
    el('nav-projects').textContent = t('navProjects');
    el('nav-contact').textContent = t('navContact');
    el('nav-cta').textContent = t('navHire');

    /* Mobile nav */
    document.querySelectorAll('.mobile-nav-link').forEach((link, i) => {
      const keys = ['navAbout', 'navProjects', 'navContact'];
      link.textContent = t(keys[i]);
    });

    /* Hero badge */
    if(D.available){
      el('hero-badge').style.display='inline-flex';
      el('badge-text').textContent = isFr ? D.availableTextFr : D.availableText;
    }

    /* Hero title */
    const taglines = isFr ? D.taglineFr : D.tagline;
    const titleLines = taglines.map((line,i)=>{
      const content = esc(line);
      return i===D.taglineAccent ? `<em>${content}</em>` : content;
    });
    el('hero-title').innerHTML = titleLines.join('<br>');

    /* Hero desc */
    el('hero-desc').textContent = isFr ? D.descriptionFr : D.description;

    /* Buttons */
    el('hero-view-projects').textContent = t('heroViewProjects');
    el('hero-get-in-touch').textContent = t('heroGetInTouch');

    /* Avatar & card */
    el('hero-avatar').innerHTML = `<img src="my_pro_picture.png" alt="${esc(D.name)}">`;
    el('hero-card-name').textContent = D.name;
    el('hero-card-role').textContent = D.role;

    /* Skill pills */
    el('skill-pills').innerHTML = D.tagSkills.map(s=>{
      const hl = D.highlightSkills.includes(s);
      return `<span class="skill-pill${hl?' hl':''}">${esc(s)}</span>`;
    }).join('');

    /* Stats */
    el('hero-stats').innerHTML = D.stats.map(s=>{
      const label = isFr && s.labelFr ? s.labelFr : s.label;
      return `<div><div class="stat-num">${esc(s.number)}</div><div class="stat-lbl">${esc(label)}</div></div>`;
    }).join('');

    /* About section labels */
    el('section-label-about').textContent = t('sectionAbout');
    el('section-label-work').textContent = t('sectionWork');
    el('section-label-contact').textContent = t('sectionContact');
    el('selected-projects').textContent = t('selectedProjects');
    el('selected-projects-em').textContent = t('selectedProjectsEm');

    /* About title */
    const aboutHeadline = isFr ? D.about.headlineFr : D.about.headline;
    el('about-title').innerHTML = aboutHeadline.map((part,i)=>
      i===D.about.accentIndex ? `<em>${esc(part)}</em>` : esc(part)
    ).join('');

    /* About bio */
    const aboutParagraphs = isFr ? D.about.paragraphsFr : D.about.paragraphs;
    el('about-bio').innerHTML = aboutParagraphs.map(p=>`<p>${esc(p)}</p>`).join('');

    /* Stack */
    el('stack-grid').innerHTML = D.about.stack.map(s=>{
      const name = isFr && s.nameFr ? s.nameFr : s.name;
      const level = isFr && s.levelFr ? s.levelFr : s.level;
      return `<div class="stack-item">
        <div class="stack-icon">${s.icon}</div>
        <div class="stack-name">${esc(name)}</div>
        <div class="stack-level">${esc(level)}</div>
      </div>`;
    }).join('');

    /* Projects */
    el('projects-grid').innerHTML = D.projects.map(p=>{
      const title = isFr && p.titleFr ? p.titleFr : p.title;
      const desc = isFr && p.descriptionFr ? p.descriptionFr : p.description;
      return `<article class="project-card">
        <div class="project-thumb" style="background:${p.gradient}">
          <div class="project-thumb-inner">${p.emoji}</div>
        </div>
        <div class="project-body">
          <div class="project-tags">${p.tags.map(t=>`<span class="project-tag">${esc(t)}</span>`).join('')}</div>
          <h3 class="project-title">${esc(title)}</h3>
          <p class="project-desc">${esc(desc)}</p>
          <div class="project-links">
            <a href="${p.demo}" class="project-link primary" target="_blank" rel="noopener">Live Demo ↗</a>
            <a href="${p.source}" class="project-link" target="_blank" rel="noopener">Source Code</a>
          </div>
        </div>
      </article>`;
    }).join('');

    /* Contact title */
    const contactHeadline = isFr ? D.contact.headlineFr : D.contact.headline;
    el('contact-title').innerHTML = contactHeadline.map((part,i)=>
      i===D.contact.accentIndex ? `<em>${esc(part)}</em>` : esc(part)
    ).join('');
    el('contact-desc').textContent = isFr ? D.contact.descriptionFr : D.contact.description;

    /* Contact socials */
    el('contact-socials').innerHTML = D.socials.map(s=>
      `<li><a href="${s.url}" target="_blank" rel="noopener">
        <span class="social-arrow">&gt;</span>${esc(s.name)}
      </a></li>`
    ).join('');

    /* Form labels */
    el('label-name').textContent = t('formName');
    el('f-name').placeholder = t('formNamePlaceholder');
    el('label-email').textContent = t('formEmail');
    el('f-email').placeholder = t('formEmailPlaceholder');
    el('label-subject').textContent = t('formSubject');
    el('f-subject').placeholder = t('formSubjectPlaceholder');
    el('label-message').textContent = t('formMessage');
    el('f-message').placeholder = t('formMessagePlaceholder');
    el('form-submit').textContent = t('formSubmit') + ' ' + t('formSubmitArrow');

    /* Footer */
    const built = t('footerBuilt');
    el('footer-copy').textContent = `© ${new Date().getFullYear()} ${D.name}. ${built}`;
    el('footer-socials').innerHTML = D.socials.map(s=>
      `<li><a href="${s.url}" target="_blank" rel="noopener">${esc(s.name)}</a></li>`
    ).join('');
  }

  /* ── Nav scroll ── */
  const nav = el('nav');
  window.addEventListener('scroll',()=>nav.classList.toggle('stuck',scrollY>60),{passive:true});

  /* ── Mobile menu ── */
  const mobileMenu = el('mobile-menu');
  const mobileMenuBtn = el('mobile-menu-btn');
  const mobileMenuClose = el('mobile-menu-close');

  mobileMenuBtn.addEventListener('click', () => {
    mobileMenu.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  });

  function closeMobileMenu() {
    mobileMenu.style.display = 'none';
    document.body.style.overflow = '';
  }

  mobileMenuClose.addEventListener('click', closeMobileMenu);
  document.querySelectorAll('.mobile-nav-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      closeMobileMenu();
      const target = document.querySelector(link.getAttribute('href'));
      if(target) target.scrollIntoView({behavior:'smooth'});
    });
  });

  /* ── Smooth scroll for all anchor links (prevents new tab bugs) ── */
  document.querySelectorAll('a[href^="#"]').forEach(link => {
    link.addEventListener('click', function(e) {
      const href = this.getAttribute('href');
      if(href && href.startsWith('#') && href.length > 1) {
        e.preventDefault();
        const target = document.querySelector(href);
        if(target) {
          target.scrollIntoView({behavior:'smooth', block:'start'});
          // Update URL without jumping
          history.pushState(null, null, href);
        }
      }
    });
  });

  /* ── Cursor glow ── */
  const glow = el('cursor-glow');
  window.addEventListener('mousemove',e=>{
    glow.style.left=e.clientX+'px';
    glow.style.top=e.clientY+'px';
  },{passive:true});

  /* ── Scroll reveal ── */
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}});
  },{threshold:.12});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

  /* ── Contact form ── */
  el('contact-form').addEventListener('submit',async function(e){
    e.preventDefault();
    const btn=el('form-submit');
    const msg=el('form-msg');
    btn.disabled=true;
    btn.textContent = currentLang === 'fr' ? 'Envoi en cours…' : 'Sending…';
    msg.style.display='none';

    const formData = new FormData(this);
    const id = D.contact.formspreeId;

    if(id && id!=='YOUR_FORMSPREE_ID'){
      try{
        const res = await fetch(`https://formspree.io/f/${id}`,{
          method:'POST',
          body:formData,
          headers:{Accept:'application/json'}
        });
        if(res.ok){
          msg.className='form-msg ok';
          msg.textContent = currentLang === 'fr' 
            ? "✓ Message envoyé ! Je vous répondrai bientôt."
            : "✓ Message sent! I'll get back to you soon.";
          this.reset();
        } else {
          throw new Error();
        }
      }catch{
        msg.className='form-msg err';
        msg.textContent = currentLang === 'fr'
          ? "Une erreur s'est produite. Essayez de m'envoyer un email directement."
          : 'Something went wrong. Try emailing me directly.';
      }
    } else {
      await new Promise(r=>setTimeout(r,900));
      msg.className='form-msg ok';
      msg.textContent = currentLang === 'fr'
        ? "✓ Mode démo : Définissez votre ID Formspree dans le JSON pour activer l'envoi réel."
        : '✓ Demo mode: Set your Formspree ID in the JSON to enable real sending.';
    }

    msg.style.display='block';
    btn.disabled=false;
    btn.textContent = t('formSubmit') + ' ' + t('formSubmitArrow');
  });

  /* ── Interactive Card Logic ── */
  const card = el('hero-card');
  const avatar = el('hero-avatar');

  avatar.addEventListener('click', () => {
    card.classList.toggle('expanded');
  });

  /* ── Initial render ── */
  setLanguage(currentLang);

})();
</script>
</body>
</html>
